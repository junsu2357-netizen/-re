<!DOCTYPE html>
<html lang="ko">
<head>

        .container { text-align: center; }
        .feature-card { 
            background: white; border-radius: 20px; padding: 40px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); cursor: pointer;

        .feature-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { margin-bottom: 50px; color: #1a1a1a; font-size: 2.5rem; }
        h2 { margin: 0; font-size: 24px; color: #0056b3; }
        p { color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Metanet X 프로젝트</h1>
        
        <a href="metanet_tech.html" class="feature-card">
            <div class="icon">🚀</div>
            <h2>메타넷엑스 기술 자료조사</h2>
            <p>상세 분석 및 기술 스택 리포트 확인</p>

</html>
